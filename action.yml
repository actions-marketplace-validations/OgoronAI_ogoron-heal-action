name: Ogoron Heal
description: Run Ogoron heal workflows for generated tests or project tests on Linux runners.
author: OgoronAI
branding:
  icon: activity
  color: orange

inputs:
  ui:
    description: Run UI heal workflow for generated UI tests.
    required: false
    default: "false"
  unit-api:
    description: Run heal workflow for generated unit and API-adjacent test execution.
    required: false
    default: "false"
  project:
    description: Run heal tests in project mode (config paths.tests) instead of generated batches.
    required: false
    default: "false"
  working-directory:
    description: Repository directory where commands should run.
    required: false
    default: .
  cli-version:
    description: Ogoron CLI release version to download.
    required: false
    default: 5.2.0
  download-url:
    description: Explicit Linux bundle URL override.
    required: false
  debug:
    description: Pass --debug to Ogoron heal commands.
    required: false
    default: "false"
  create-pr:
    description: Create or update a pull request when healing changes repository files.
    required: false
    default: "false"
  pr-branch:
    description: Branch used for healed artifact changes.
    required: false
    default: ogoron/heal
  pr-title:
    description: Pull request title.
    required: false
    default: Heal Ogoron test artifacts
  commit-message:
    description: Commit message used for healed artifacts.
    required: false
    default: Heal Ogoron test artifacts
  author-name:
    description: Git author name for healed commit.
    required: false
    default: ogoron-bot
  author-email:
    description: Git author email for healed commit.
    required: false
    default: agents@ogoron.com

outputs:
  ogoron-bin:
    description: Absolute path to the downloaded Ogoron executable.
    value: ${{ steps.install.outputs.ogoron-bin }}
  changes-detected:
    description: Whether healing changed repository files.
    value: ${{ steps.heal.outputs.changes-detected }}
  pull-request-url:
    description: URL of the created or updated pull request, if any.
    value: ${{ steps.pr.outputs.pull-request-url }}
  branch-name:
    description: Branch name used for healed artifacts.
    value: ${{ inputs.pr-branch }}

runs:
  using: composite
  steps:
    - id: install
      name: Install Ogoron
      shell: bash
      run: "${{ github.action_path }}/scripts/install-ogoron.sh"
      env:
        INPUT_CLI_VERSION: ${{ inputs.cli-version }}
        INPUT_DOWNLOAD_URL: ${{ inputs.download-url }}

    - id: heal
      name: Run heal workflows
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: "${{ github.action_path }}/scripts/run-heal.sh"
      env:
        OGORON_BIN: ${{ steps.install.outputs.ogoron-bin }}
        INPUT_UI: ${{ inputs.ui }}
        INPUT_UNIT_API: ${{ inputs.unit-api }}
        INPUT_PROJECT: ${{ inputs.project }}
        INPUT_DEBUG: ${{ inputs.debug }}
        INPUT_AUTHOR_NAME: ${{ inputs.author-name }}
        INPUT_AUTHOR_EMAIL: ${{ inputs.author-email }}
        OGORON_PLAIN: "1"
        NO_COLOR: "1"
        CI: "1"

    - id: pr
      name: Create pull request
      if: ${{ inputs.create-pr == 'true' && steps.heal.outputs.changes-detected == 'true' }}
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ env.GITHUB_TOKEN }}
        branch: ${{ inputs.pr-branch }}
        title: ${{ inputs.pr-title }}
        commit-message: ${{ inputs.commit-message }}
        body-path: ${{ steps.heal.outputs.pr-body-path }}
        author: ${{ inputs.author-name }} <${{ inputs.author-email }}>
        committer: ${{ inputs.author-name }} <${{ inputs.author-email }}>
